name: Generate release entries

on:
  push:
    branches:
      - not-develop
permissions: {}
jobs:
  generate_release_entries:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - run: |
          gh api /repos/nationalarchives/pronom/commits/$GITHUB_SHA | jq
        env:
          GH_TOKEN: ${{ github.token }}
